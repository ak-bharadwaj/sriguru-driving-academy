<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <symbol id="logo" viewBox="0 0 100 100" fill="none">
    <!-- Premium octagonal badge with electric blue and amber core -->
    <path d="M 30,8 L 70,8 L 92,30 L 92,70 L 70,92 L 30,92 L 8,70 L 8,30 Z" fill="#0A0E1A" stroke="#2563EB" stroke-width="4" stroke-linejoin="round" />
    <path d="M 33,13 L 67,13 L 87,33 L 87,67 L 67,87 L 33,87 L 13,67 L 13,33 Z" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-linejoin="round" />
    
    <!-- Steering Wheel Path -->
    <circle cx="50" cy="50" r="28" stroke="#FFFFFF" stroke-width="4" fill="none" />
    <circle cx="50" cy="50" r="10" stroke="#FFFFFF" stroke-width="2" fill="none" />
    
    <!-- Steering Wheel Spokes -->
    <line x1="50" y1="22" x2="50" y2="40" stroke="#FFFFFF" stroke-width="3" />
    <line x1="22" y1="50" x2="40" y2="50" stroke="#FFFFFF" stroke-width="3" />
    <line x1="78" y1="50" x2="60" y2="50" stroke="#FFFFFF" stroke-width="3" />
  </symbol>
</svg>
